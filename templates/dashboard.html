{% extends "base.html" %}

{% block title %}Dashboard — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Welcome, {{ user_name }}</h1>
            <p class="auth-subtitle">Your dashboard is being built. More coming soon.</p>
        </div>

        <div class="auth-card">
            <p style="color: var(--ink-muted); font-size: 0.95rem; margin-bottom: 1.25rem;">
                You are signed in as <strong>{{ user_name }}</strong>.
            </p>
            <a href="{{ url_for('logout') }}" class="btn-submit">Log out</a>
        </div>

    </div>
</section>

{% endblock %}
